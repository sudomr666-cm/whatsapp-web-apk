plugins {
    id 'com.android.application'
}

android {
    namespace "com.example.app"   // ✅ MUST (এইটা ছাড়া build হবে না)

    compileSdk 33

    defaultConfig {
        applicationId "com.example.app"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
        }
    }
}

dependencies {
}
